<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <!-- viewport-fit=cover: la app pinta TODA la pantalla, incluidas las zonas
       del notch/barra de gestos (con safe-area en CSS para no tapar contenido) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA -->
  <meta name="theme-color" content="#ffffff" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Picantería" />

  <!-- Open Graph / WhatsApp / Facebook Preview -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://restaurant-frontend.vercel.app/" />
  <meta property="og:title" content="Picantería Miraflores" />
  <meta property="og:description" content="Sabor Tradicional." />
  <meta property="og:image" content="https://picanteria-miraflores.vercel.app/image1.png" />

  <title>Picantería Miraflores - Sabor Tradicional</title>
  <!-- Tailwind ahora se compila en el build (tailwind.config.js + PostCSS):
       sin dependencia del CDN en runtime y CSS mínimo solo con lo usado -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>

</html>
